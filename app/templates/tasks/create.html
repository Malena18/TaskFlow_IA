{% extends "base.html" %}

{% block title %}Nueva Tarea - TaskFlow IA{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Crear Nueva Tarea</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('tasks.create_task') }}">
                    
                    <div class="mb-3">
                        <label for="title" class="form-label text-dark fw-bold">Título de la Tarea <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title" required placeholder="Ej: Revisar arquitectura del proyecto">
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label text-dark fw-bold">Descripción</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Detalles de la tarea..."></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="priority" class="form-label text-dark fw-bold">Prioridad</label>
                            <select class="form-select" id="priority" name="priority">
                                <option value="Baja">Baja</option>
                                <option value="Media" selected>Media</option>
                                <option value="Alta">Alta</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="due_date" class="form-label text-dark fw-bold">Fecha Límite</label>
                            <input type="datetime-local" class="form-control" id="due_date" name="due_date">
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar Tarea</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
